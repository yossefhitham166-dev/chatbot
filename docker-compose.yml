version: "3.8"

services:
  whatsapp-bot:
    build: .
    container_name: whatsapp-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist WhatsApp session so QR is only scanned once
      - ./session:/app/session
    environment:
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
