services:
  - type: worker          # Background Worker — runs 24/7, no HTTP needed
    name: whatsapp-bot
    runtime: docker       # Uses our Dockerfile
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false       # You'll set this manually in the Render dashboard
      - key: REPLY_IN_GROUPS
        value: false
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
